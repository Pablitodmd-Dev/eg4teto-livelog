name: Fetch Club Log Data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download QSOs from Club Log
        run: |
          curl -s "https://clublog.org/livestream_json.php?call=EG4TETO" -o qsos.json || echo '[]' > qsos.json

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qsos.json
          git diff --cached --quiet || git commit -m "chore: update qsos.json"
          git push
